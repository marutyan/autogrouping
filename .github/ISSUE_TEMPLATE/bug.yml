name: Bug report
description: Report a reproducible AutoGrouping problem
title: "bug: "
body:
  - type: input
    id: chrome
    attributes:
      label: Chrome version
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
