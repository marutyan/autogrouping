name: One-time lint fix

on:
  push:
    branches: [agent/initial-implementation]

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/initial-implementation
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply lint fixes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          popup = Path('entrypoints/popup/PopupApp.tsx')
          text = popup.read_text()
          text = text.replace(
              '<div\n                className={rowClasses}\n                key={rule.id}',
              '<div\n                role="listitem"\n                className={rowClasses}\n                key={rule.id}',
              1,
          )
          popup.write_text(text)

          fixtures = Path('tests/e2e/fixtures.ts')
          text = fixtures.read_text().replace(
              'context: async ({}, use) => {',
              'context: async (_fixtures, use) => {',
              1,
          )
          fixtures.write_text(text)

          styles = Path('entrypoints/popup/style.css')
          styles.write_text(styles.read_text().replace('padding: 0 !important;', 'padding: 0;', 1))
          PY
          pnpm format
          rm .github/workflows/fix-lint-once.yml
      - name: Commit fixes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .
          git commit -m "fix: resolve popup interaction lint"
          git push origin HEAD:agent/initial-implementation
