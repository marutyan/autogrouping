name: One-time external group removal fix

on:
  push:
    branches: [agent/initial-implementation]

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/initial-implementation
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply external-group removal recovery
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/background/controller.ts')
          text = path.read_text()
          old_listener = '''    chrome.tabGroups.onRemoved.addListener((group) => {
              this.#ownedGroups.delete(group.id);
              void this.#persistOwnedGroups();
            });'''
          new_listener = '''    chrome.tabGroups.onRemoved.addListener((group) => {
              void this.#handleGroupRemoved(group);
            });'''
          if old_listener not in text:
              raise SystemExit('tabGroups.onRemoved listener not found')
          text = text.replace(old_listener, new_listener, 1)

          marker = '''  async #handleOwnedGroupMetadataChange(group: chrome.tabGroups.TabGroup): Promise<void> {'''
          method = '''  async #handleGroupRemoved(group: chrome.tabGroups.TabGroup): Promise<void> {
              const ownedChanged = this.#ownedGroups.delete(group.id);
              if (ownedChanged) await this.#persistOwnedGroups();

              const tabs = await chrome.tabs.query({ windowId: group.windowId });
              let stateChanged = false;
              for (const tab of tabs) {
                if (tab.id === undefined) continue;
                const current = this.#tabStates.get(tab.id);
                if (current?.state !== "protected-external") continue;
                if (
                  tab.groupId !== undefined &&
                  tab.groupId !== TAB_GROUP_ID_NONE &&
                  !this.#ownedGroups.has(tab.groupId)
                ) {
                  continue;
                }

                this.#tabStates.set(
                  tab.id,
                  reduceTabState(current, { type: "external-left", at: Date.now() }),
                );
                this.#scheduleEvaluation(tab.id, 0);
                stateChanged = true;
              }
              if (stateChanged) await this.#persistTabStates();
            }

          '''
          if marker not in text:
              raise SystemExit('method insertion marker not found')
          text = text.replace(marker, method + marker, 1)
          path.write_text(text)
          PY
          rm docs/E2E_FINAL_DIAGNOSTIC.txt
          pnpm format
          rm .github/workflows/fix-external-group-removal-once.yml
      - name: Commit fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .
          git commit -m "fix: resume after an external group is removed"
          git push origin HEAD:agent/initial-implementation
