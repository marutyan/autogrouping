name: One-time E2E server close fix

on:
  push:
    branches: [agent/initial-implementation]

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/initial-implementation
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Close E2E HTTP connections explicitly
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('tests/e2e/autogrouping.spec.ts')
          text = path.read_text()
          text = text.replace(
              'response.writeHead(200, { "content-type": "text/html; charset=utf-8" });',
              'response.writeHead(200, {\n      "connection": "close",\n      "content-type": "text/html; charset=utf-8",\n    });',
              1,
          )
          text = text.replace(
              'async function closeServer(server: Server): Promise<void> {\n  await new Promise<void>((resolve, reject) => {',
              'async function closeServer(server: Server): Promise<void> {\n  server.closeAllConnections();\n  await new Promise<void>((resolve, reject) => {',
              1,
          )
          path.write_text(text)
          PY
          pnpm format
          rm .github/workflows/fix-e2e-server-close-once.yml
      - name: Commit fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .
          git commit -m "fix: close E2E test server connections"
          git push origin HEAD:agent/initial-implementation
