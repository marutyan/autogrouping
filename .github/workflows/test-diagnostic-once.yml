name: One-time unit test diagnostic

on:
  push:
    branches: [agent/initial-implementation]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/initial-implementation
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture test output
        run: |
          pnpm test > docs/TEST_DIAGNOSTIC.txt 2>&1 || true
          rm .github/workflows/test-diagnostic-once.yml
      - name: Commit diagnostic
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .
          git commit -m "chore: capture unit test diagnostic"
          git push origin HEAD:agent/initial-implementation
