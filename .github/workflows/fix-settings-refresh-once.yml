# Temporary workflow: applies the controller patch and deletes itself.
name: One-time settings refresh fix

on:
  push:
    branches: [agent/initial-implementation]

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/initial-implementation
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Refresh settings before resumed automation
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/background/controller.ts')
          text = path.read_text()

          old_reevaluate = '''  async reevaluateWindow(windowId: number): Promise<void> {
            const tabs = await chrome.tabs.query({ windowId });
            for (const tab of tabs) if (tab.id !== undefined) this.#scheduleEvaluation(tab.id, 0);
          }'''
          new_reevaluate = '''  async reevaluateWindow(windowId: number): Promise<void> {
            this.#settings = await this.#storage.getSettings();
            const tabs = await chrome.tabs.query({ windowId });
            for (const tab of tabs) if (tab.id !== undefined) this.#scheduleEvaluation(tab.id, 0);
          }'''
          if old_reevaluate not in text:
              raise SystemExit('reevaluateWindow block not found')
          text = text.replace(old_reevaluate, new_reevaluate, 1)

          old_classify_tail = '''    if (current.state === "protected-external") {
              this.#tabStates.set(
                tabId,
                reduceTabState(current, { type: "external-left", at: Date.now() }),
              );
              await this.#persistTabStates();
            }
            this.#scheduleEvaluation(tabId, 0);'''
          new_classify_tail = '''    if (current.state === "protected-external") {
              this.#tabStates.set(
                tabId,
                reduceTabState(current, { type: "external-left", at: Date.now() }),
              );
              await this.#persistTabStates();
            }
            this.#settings = await this.#storage.getSettings();
            this.#scheduleEvaluation(tabId, 0);'''
          if old_classify_tail not in text:
              raise SystemExit('external-left classification block not found')
          text = text.replace(old_classify_tail, new_classify_tail, 1)

          old_removed = '''  async #handleGroupRemoved(group: chrome.tabGroups.TabGroup): Promise<void> {
            const ownedChanged = this.#ownedGroups.delete(group.id);
            if (ownedChanged) await this.#persistOwnedGroups();

            const tabs = await chrome.tabs.query({ windowId: group.windowId });'''
          new_removed = '''  async #handleGroupRemoved(group: chrome.tabGroups.TabGroup): Promise<void> {
            const ownedChanged = this.#ownedGroups.delete(group.id);
            if (ownedChanged) await this.#persistOwnedGroups();
            this.#settings = await this.#storage.getSettings();

            const tabs = await chrome.tabs.query({ windowId: group.windowId });'''
          if old_removed not in text:
              raise SystemExit('handleGroupRemoved block not found')
          text = text.replace(old_removed, new_removed, 1)

          path.write_text(text)
          PY
          rm docs/E2E_LATEST_DIAGNOSTIC.txt
          pnpm format
          rm .github/workflows/fix-settings-refresh-once.yml
      - name: Commit fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .
          git commit -m "fix: refresh rules when external protection ends"
          git push origin HEAD:agent/initial-implementation
